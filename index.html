<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蛊真人 · 青茅迷梦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Serif SC', serif;
    background: #0a0a0a;
    color: #c8b88a;
    min-height: 100vh;
    overflow: hidden;
  }
  
  /* 开始界面 */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #1a1510 0%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  
  #start-screen h1 {
    font-size: 4rem;
    color: #8b7355;
    text-shadow: 0 0 30px rgba(139, 115, 85, 0.5);
    margin-bottom: 0.5rem;
    letter-spacing: 1rem;
  }
  
  #start-screen .subtitle {
    font-size: 1.2rem;
    color: #5a4a3a;
    margin-bottom: 3rem;
    letter-spacing: 0.5rem;
  }
  
  .start-input {
    background: #151210;
    border: 1px solid #3a3020;
    color: #c8b88a;
    padding: 12px 24px;
    font-size: 1.1rem;
    font-family: inherit;
    width: 300px;
    text-align: center;
    margin-bottom: 1.5rem;
    outline: none;
    transition: border-color 0.3s;
  }
  
  .start-input:focus { border-color: #8b7355; }
  
  .btn {
    background: linear-gradient(180deg, #2a2218 0%, #1a1510 100%);
    border: 1px solid #5a4a30;
    color: #c8b88a;
    padding: 12px 32px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    margin: 5px;
  }
  
  .btn:hover {
    background: linear-gradient(180deg, #3a2e20 0%, #2a2218 100%);
    border-color: #8b7355;
    color: #e8d8a8;
  }
  
  .btn-primary {
    background: linear-gradient(180deg, #4a3a20 0%, #2a2010 100%);
    border-color: #8b6914;
  }
  
  .btn-primary:hover {
    border-color: #c89a30;
    box-shadow: 0 0 15px rgba(200, 154, 48, 0.3);
  }
  
  .btn-danger {
    border-color: #8b3030;
    color: #c87878;
  }
  
  .btn-small {
    padding: 6px 16px;
    font-size: 0.85rem;
  }
  
  /* 主界面 */
  #game-screen {
    display: none;
    width: 100vw;
    height: 100vh;
  }
  
  .game-layout {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    height: 100vh;
  }
  
  /* 左侧状态栏 */
  .panel-left {
    background: #0d0b09;
    border-right: 1px solid #2a2218;
    padding: 15px;
    overflow-y: auto;
  }
  
  .panel-title {
    color: #8b7355;
    font-size: 1rem;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a2218;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  
  .player-info { margin-bottom: 20px; }
  .player-name {
    font-size: 1.3rem;
    color: #d4c090;
    margin-bottom: 5px;
  }
  
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
  }
  
  .stat-label { color: #7a6a50; }
  .stat-value { color: #c8b88a; }
  
  .progress-bar {
    height: 8px;
    background: #1a1510;
    border: 1px solid #2a2218;
    margin: 4px 0 8px;
    position: relative;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    transition: width 0.3s;
  }
  
  .progress-zhenyuan { background: linear-gradient(90deg, #2a5a8b, #4a8ac8); }
  .progress-xiuwei { background: linear-gradient(90deg, #8b5a2a, #c88a4a); }
  
  /* 品质颜色 */
  .quality-1 { color: #a0a0a0; }
  .quality-2 { color: #50a050; }
  .quality-3 { color: #5080d0; }
  .quality-4 { color: #a050c0; }
  .quality-5 { color: #d0a020; }
  .quality-6 { color: #e04040; }
  .quality-7 { color: #ff6060; }
  .quality-8 { color: #ffaa00; }
  .quality-9 { color: #ffdd44; text-shadow: 0 0 8px rgba(255,221,68,0.5); }
  
  /* 蛊虫列表 */
  .gu-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 15px;
  }
  
  .gu-item {
    width: 45%;
    background: #151210;
    border: 1px solid #2a2218;
    padding: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .gu-item:hover {
    border-color: #5a4a30;
    background: #1a1612;
  }
  
  .gu-name { font-weight: 600; margin-bottom: 3px; }
  .gu-type { font-size: 0.7rem; color: #6a5a40; }
  
  /* 装备栏 */
  .equip-slot {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 8px;
    margin-bottom: 6px;
    font-size: 0.85rem;
  }
  
  .equip-slot.empty { color: #4a3a2a; font-style: italic; }
  
  /* 中间剧情区 */
  .panel-center {
    display: flex;
    flex-direction: column;
    background: #0f0d0b;
  }
  
  .story-area {
    flex: 1;
    padding: 30px 40px;
    overflow-y: auto;
    line-height: 2;
    font-size: 1rem;
  }
  
  .story-text {
    max-width: 800px;
    margin: 0 auto;
  }
  
  .story-text p {
    margin-bottom: 1em;
    text-indent: 2em;
  }
  
  .story-text .narration { color: #a09070; }
  .story-text .dialogue { color: #c8b88a; }
  .story-text .important { color: #d4a040; font-weight: 600; }
  
  .choices-area {
    padding: 20px 40px;
    border-top: 1px solid #2a2218;
    background: #0d0b09;
  }
  
  .choices-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .choice-btn {
    text-align: left;
    padding: 14px 20px;
    background: #151210;
    border: 1px solid #2a2218;
    color: #b8a878;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .choice-btn:hover {
    background: #1e1812;
    border-color: #5a4a30;
    color: #d8c898;
    padding-left: 25px;
  }
  
  /* 右侧功能区 */
  .panel-right {
    background: #0d0b09;
    border-left: 1px solid #2a2218;
    display: flex;
    flex-direction: column;
  }
  
  .tab-bar {
    display: flex;
    flex-wrap: wrap;
    border-bottom: 1px solid #2a2218;
  }
  
  .tab-btn {
    flex: 1;
    min-width: 60px;
    padding: 10px 5px;
    background: none;
    border: none;
    color: #6a5a40;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  
  .tab-btn.active {
    color: #c89a30;
    border-bottom-color: #c89a30;
  }
  
  .tab-btn:hover { color: #a08850; }
  
  .tab-content {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: none;
  }
  
  .tab-content.active { display: block; }
  
  /* 背包物品 */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  
  .item-card {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 10px;
    font-size: 0.85rem;
  }
  
  .item-card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  
  .item-desc {
    font-size: 0.75rem;
    color: #7a6a50;
    line-height: 1.5;
  }
  
  .item-actions {
    margin-top: 8px;
    display: flex;
    gap: 5px;
  }
  
  /* 融合系统 */
  .fusion-area {
    text-align: center;
    margin-bottom: 20px;
  }
  
  .fusion-slots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
  }
  
  .fusion-slot {
    width: 80px;
    height: 80px;
    border: 2px dashed #3a3020;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: #5a4a30;
    cursor: pointer;
    background: #151210;
  }
  
  .fusion-slot.filled {
    border-style: solid;
    border-color: #5a4a30;
  }
  
  .fusion-plus {
    font-size: 1.5rem;
    color: #5a4a30;
  }
  
  .fusion-result {
    min-height: 40px;
    padding: 10px;
    background: #151210;
    border: 1px solid #2a2218;
    font-size: 0.85rem;
    margin-top: 10px;
  }
  
  /* 杀招列表 */
  .killer-list { display: flex; flex-direction: column; gap: 10px; }
  
  .killer-card {
    background: #151210;
    border: 1px solid #3a2a1a;
    padding: 12px;
  }
  
  .killer-name {
    color: #c89a30;
    font-size: 0.95rem;
    margin-bottom: 5px;
  }
  
  .killer-req {
    font-size: 0.75rem;
    color: #7a6a50;
    margin-bottom: 5px;
  }
  
  .killer-desc {
    font-size: 0.8rem;
    color: #9a8a60;
    line-height: 1.5;
  }
  
  /* 副本列表 */
  .dungeon-list { display: flex; flex-direction: column; gap: 12px; }
  
  .dungeon-card {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 12px;
  }
  
  .dungeon-name {
    color: #a08050;
    font-size: 0.95rem;
    margin-bottom: 5px;
  }
  
  .dungeon-info {
    font-size: 0.75rem;
    color: #6a5a40;
    margin-bottom: 8px;
  }
  
  /* 福地 */
  .paradise-info {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 15px;
    margin-bottom: 15px;
  }
  
  .paradise-resource {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.85rem;
  }
  
  .paradise-buildings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .building-card {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 10px;
    font-size: 0.8rem;
    text-align: center;
  }
  
  /* 成就 */
  .achievement-list { display: flex; flex-direction: column; gap: 8px; }
  
  .achievement-card {
    background: #151210;
    border: 1px solid #2a2218;
    padding: 10px;
    opacity: 0.5;
  }
  
  .achievement-card.unlocked {
    opacity: 1;
    border-color: #8b6914;
  }
  
  .achievement-name {
    font-size: 0.9rem;
    margin-bottom: 3px;
  }
  
  .achievement-desc {
    font-size: 0.75rem;
    color: #6a5a40;
  }
  
  /* 模态框 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  
  .modal-overlay.active { display: flex; }
  
  .modal {
    background: #12100d;
    border: 1px solid #3a3020;
    padding: 25px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  
  .modal-title {
    color: #c89a30;
    font-size: 1.2rem;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2a2218;
  }
  
  /* 战斗界面 */
  .battle-area {
    text-align: center;
    padding: 20px;
  }
  
  .battle-enemy {
    margin-bottom: 30px;
  }
  
  .enemy-name {
    font-size: 1.3rem;
    color: #c85050;
    margin-bottom: 10px;
  }
  
  .enemy-hp {
    width: 200px;
    margin: 0 auto 10px;
  }
  
  .battle-log {
    background: #0d0b09;
    border: 1px solid #2a2218;
    padding: 15px;
    margin: 20px 0;
    height: 120px;
    overflow-y: auto;
    text-align: left;
    font-size: 0.85rem;
    line-height: 1.8;
  }
  
  .battle-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  
  /* Toast */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 310px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .toast {
    background: #1a1510;
    border: 1px solid #5a4a30;
    padding: 10px 20px;
    color: #c8b88a;
    font-size: 0.9rem;
    animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
  }
  
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  
  @keyframes fadeOut {
    to { opacity: 0; }
  }
  
  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d0b09; }
  ::-webkit-scrollbar-thumb { background: #2a2218; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3020; }
  
  /* 响应式 */
  @media (max-width: 1024px) {
    .game-layout { grid-template-columns: 200px 1fr 220px; }
    .panel-left, .panel-right { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<!-- 开始界面 -->
<div id="start-screen">
  <h1>蛊真人</h1>
  <div class="subtitle">— 青茅迷梦 —</div>
  <input type="text" class="start-input" id="player-name" placeholder="请输入道号" maxlength="10">
  <div>
    <button class="btn btn-primary" onclick="startNewGame()">踏入仙途</button>
  </div>
  <div style="margin-top: 20px;">
    <button class="btn" onclick="loadGame()" id="continue-btn" style="display:none;">继续旧梦</button>
  </div>
  <div style="margin-top: 60px; color: #4a3a2a; font-size: 0.8rem;">
    万物皆可为蛊 · 一念成佛一念成魔
  </div>
</div>

<!-- 主游戏界面 -->
<div id="game-screen">
  <div class="game-layout">
    
    <!-- 左侧状态栏 -->
    <div class="panel-left">
      <div class="player-info">
        <div class="player-name" id="display-name">方源</div>
        <div class="stat-row">
          <span class="stat-label">身份</span>
          <span class="stat-value" id="player-identity">外姓子弟</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">修为</span>
          <span class="stat-value quality-1" id="player-realm">一转初阶</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill progress-xiuwei" id="xiuwei-bar" style="width: 10%"></div>
        </div>
      </div>
      
      <div class="panel-title">空 窍</div>
      <div class="stat-row">
        <span class="stat-label">空窍品级</span>
        <span class="stat-value" id="qiao-grade">下品海窍</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">真元</span>
        <span class="stat-value" id="zhenyuan-text">10/100</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill progress-zhenyuan" id="zhenyuan-bar" style="width: 10%"></div>
      </div>
      
      <div class="panel-title" style="margin-top: 20px;">本命蛊</div>
      <div class="gu-item" id="mingu-display" style="width: 100%;">
        <div class="gu-name quality-1">月光蛊</div>
        <div class="gu-type">攻击型 · 一转</div>
      </div>
      
      <div class="panel-title" style="margin-top: 20px;">蛊虫列表</div>
      <div class="gu-list" id="gu-list"></div>
      
      <div class="panel-title" style="margin-top: 20px;">装 备</div>
      <div class="equip-slot" id="equip-weapon">武器：空</div>
      <div class="equip-slot" id="equip-armor">防具：空</div>
      <div class="equip-slot" id="equip-accessory">饰品：空</div>
    </div>
    
    <!-- 中间剧情区 -->
    <div class="panel-center">
      <div class="story-area" id="story-area">
        <div class="story-text" id="story-text"></div>
      </div>
      <div class="choices-area">
        <div class="choices-container" id="choices-container"></div>
      </div>
    </div>
    
    <!-- 右侧功能区 -->
    <div class="panel-right">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('bag')">背包</button>
        <button class="tab-btn" onclick="switchTab('fusion')">炼蛊</button>
        <button class="tab-btn" onclick="switchTab('killer')">杀招</button>
        <button class="tab-btn" onclick="switchTab('dungeon')">秘境</button>
        <button class="tab-btn" onclick="switchTab('paradise')">福地</button>
        <button class="tab-btn" onclick="switchTab('achievement')">成就</button>
      </div>
      
      <div class="tab-content active" id="tab-bag">
        <div class="panel-title">背 包</div>
        <div class="item-list" id="bag-list"></div>
      </div>
      
      <div class="tab-content" id="tab-fusion">
        <div class="panel-title">蛊虫融合</div>
        <div class="fusion-area">
          <div class="fusion-slots">
            <div class="fusion-slot" id="fusion-slot-1" onclick="selectFusionGu(0)">点击选择</div>
            <div class="fusion-plus">+</div>
            <div class="fusion-slot" id="fusion-slot-2" onclick="selectFusionGu(1)">点击选择</div>
          </div>
          <button class="btn btn-primary btn-small" onclick="doFusion()">开始融合</button>
          <div class="fusion-result" id="fusion-result">选择两只同阶蛊虫进行融合</div>
        </div>
        <div style="font-size: 0.75rem; color: #6a5a40; line-height: 1.6;">
          · 同阶蛊虫可融合，有概率升阶<br>
          · 特定配方可合成稀有蛊虫<br>
          · 融合失败蛊虫将损毁
        </div>
      </div>
      
      <div class="tab-content" id="tab-killer">
        <div class="panel-title">仙道杀招</div>
        <div class="killer-list" id="killer-list"></div>
      </div>
      
      <div class="tab-content" id="tab-dungeon">
        <div class="panel-title">秘境副本</div>
        <div class="dungeon-list" id="dungeon-list"></div>
      </div>
      
      <div class="tab-content" id="tab-paradise">
        <div class="panel-title">洞 天 福 地</div>
        <div id="paradise-locked" style="text-align: center; padding: 30px; color: #5a4a30; font-size: 0.85rem;">
          尚未开辟福地<br><br>
          突破六转蛊仙后可开辟仙窍福地
        </div>
        <div id="paradise-content" style="display:none;">
          <div class="paradise-info">
            <div class="stat-row" style="margin-bottom: 10px;">
              <span class="stat-label">福地等级</span>
              <span class="stat-value" id="paradise-level">下品福地</span>
            </div>
            <div class="paradise-resource">
              <span>地脉之气</span>
              <span id="resource-diqi">100</span>
            </div>
            <div class="paradise-resource">
              <span>灵泉产量/日</span>
              <span id="resource-lingquan">10</span>
            </div>
            <div class="paradise-resource">
              <span>蛊材产出</span>
              <span id="resource-gucai">少量</span>
            </div>
          </div>
          <div class="panel-title">建筑</div>
          <div class="paradise-buildings" id="paradise-buildings"></div>
        </div>
      </div>
      
      <div class="tab-content" id="tab-achievement">
        <div class="panel-title">成就名录</div>
        <div class="achievement-list" id="achievement-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- 通用模态框 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">提示</div>
    <div id="modal-content"></div>
    <div style="text-align: right; margin-top: 20px;">
      <button class="btn" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 战斗模态框 -->
<div class="modal-overlay" id="battle-modal">
  <div class="modal" style="max-width: 600px;">
    <div class="modal-title">遭遇战</div>
    <div class="battle-area">
      <div class="battle-enemy">

    text: `<p class="narration">你继续沉心修炼。日复一日，空窍中的真元越来越凝练。</p>
    <p class="narration">终于，在第七天，你感觉空窍微微一震——突破了！</p>
    <p class="important">【修为突破：一转初阶 → 一转中阶】</p>
    <p class="narration">你握了握拳，感觉力量比之前强了不少。但这还远远不够。</p>`,
    choices: [
      { text: '继续修炼，冲击更高境界', next: 'cultivate_3' },
      { text: '出关历练，实战出真知', next: 'houshan_start' },
      { text: '去集市看看有没有好东西', next: 'market' }
    ],
    onEnter: function(s) {
      if (s.realm < 1) {
        s.realm = 1;
        s.xiuweiProgress = 0;
        updateUI();
      }
    }
  },
  
  cultivate_3: {
    text: `<p class="narration">你继续闭关苦修。但越往后，修炼速度越慢。没有足够的资源，单靠苦修进步有限。</p>
    <p class="narration">你明白，是时候出去历练了。猎杀妖兽、寻找天材地宝，才是快速提升实力的途径。</p>
    <p class="important">【修为进度+15%】</p>`,
    choices: [
      { text: '前往后山历练', next: 'houshan_start' },
      { text: '去集市采购些物资', next: 'market' }
    ],
    onEnter: function(s) {
      s.xiuweiProgress = Math.min(100, (s.xiuweiProgress || 0) + 15);
      updateUI();
    }
  },
  
  houshan_start: {
    text: `<p class="narration">你来到青茅山后山。这里妖兽横行，危险重重，但也蕴藏着机缘。</p>
    <p class="narration">山林间草木茂盛，虫鸣鸟叫不绝于耳。你小心翼翼地深入，随时准备催动蛊虫应战。</p>
    <p class="narration">不多时，前方草丛传来窸窣声——一只野狼窜了出来，绿油油的眼睛死死盯着你！</p>`,
    choices: [
      { text: '迎战！催动蛊虫击杀野狼', next: 'battle_wolf' },
      { text: '谨慎起见，绕道而行', next: 'houshan_deep' }
    ]
  },
  
  battle_wolf: {
    text: `<p class="narration">你与野狼展开激战！</p>`,
    choices: [],
    battle: { enemy: '野狼', hp: 50, atk: 8, onWin: 'wolf_win' }
  },
  
  wolf_win: {
    text: `<p class="narration">野狼倒在地上，不再动弹。你微微喘气，这是你来到这个世界斩杀的第一只妖兽。</p>
    <p class="narration">从野狼身上可以剥取一些材料，虽然不值钱，但聊胜于无。</p>
    <p class="important">【获得：狼皮 ×1，经验值+10】</p>
    <p class="narration">继续深入，或许能遇到更多机缘，也可能遇到更大的危险。</p>`,
    choices: [
      { text: '继续深入后山', next: 'houshan_deep' },
      { text: '见好就收，返回山寨', next: 'back_village' }
    ],
    onEnter: function(s) {
      addItem('wolf_pelt', '狼皮', '材料', '普通野狼的皮毛，可卖钱');
      gainExp(10);
    }
  },
  
  houshan_deep: {
    text: `<p class="narration">你继续深入后山。越往里走，树木越茂密，光线越昏暗。</p>
    <p class="narration">忽然，你发现前方有一个隐蔽的山洞，洞口杂草丛生，似乎很久没人来过了。</p>
    <p class="narration">山洞中隐隐传来一股奇异的气息，似乎藏着什么东西。</p>`,
    choices: [
      { text: '进入山洞探索', next: 'cave_enter' },
      { text: '太危险了，还是离开吧', next: 'back_village' }
    ]
  },
  
  cave_enter: {
    text: `<p class="narration">你小心翼翼地走进山洞。洞内比想象中宽敞，石壁上长着一些发光的苔藓，提供了微弱的光亮。</p>
    <p class="narration">走到洞底，你发现了一具枯骨，坐在石台上，似乎是很久以前死在这里的一位蛊师。</p>
    <p class="narration">枯骨手中握着一只小小的蛊虫，已经石化，但依稀能看出是一只<strong class="important">小光蛊</strong>。</p>
    <p class="narration">旁边还有一个破旧的兽皮袋，里面装着几块元石和一本泛黄的小册子。</p>`,
    choices: [
      { text: '搜刮所有东西', next: 'cave_loot' },
      { text: '只拿元石，尊重死者', next: 'cave_respect' }
    ]
  },
  
  cave_loot: {
    text: `<p class="narration">你毫不客气地将所有东西收入囊中。在这个世界，对死人客气毫无意义。</p>
    <p class="important">【获得：小光蛊 ×1】</p>
    <p class="important">【获得：元石 ×20】</p>
    <p class="important">【获得：残缺蛊经 ×1】</p>
    <p class="narration">那本残缺蛊经上记录了一些基础蛊虫的饲养方法和一道简单的杀招配方，对你颇有价值。</p>
    <p class="important">【魔道倾向+5】</p>`,
    choices: [
      { text: '离开山洞', next: 'back_village' }
    ],
    onEnter: function(s) {
      addGu('xiaoguang');
      s.yuanshi = (s.yuanshi || 0) + 20;
      addItem('canque_gujing', '残缺蛊经', '秘籍', '记录了基础养蛊之法和一道杀招配方');
      s.karma = (s.karma || 0) + 5;
      updateUI();
    }
  },
  
  cave_respect: {
    text: `<p class="narration">你只取了元石，对枯骨躬身一礼。死者为大，这是你的原则。</p>
    <p class="narration">就在你转身离开时，那只石化的小光蛊忽然亮起微光，化作一道流光飞入你的空窍！</p>
    <p class="important">【获得：小光蛊 ×1（有灵）】</p>
    <p class="important">【获得：元石 ×20】</p>
    <p class="important">【正道倾向+10】</p>
    <p class="narration">你心中惊讶，看来这只小光蛊感应到了你的善意，主动认主了。有灵的蛊虫，威力可比普通蛊虫强上不少。</p>`,
    choices: [
      { text: '离开山洞', next: 'back_village' }
    ],
    onEnter: function(s) {
      addGu('xiaoguang');
      s.yuanshi = (s.yuanshi || 0) + 20;
      s.karma = (s.karma || 0) - 10;
      updateUI();
    }
  },
  
  back_village: {
    text: `<p class="narration">你安全返回了古月山寨。一番历练，收获不小。</p>
    <p class="narration">接下来，你打算如何安排？</p>`,
    choices: [
      { text: '闭关修炼，消化收获', next: 'cultivate_1' },
      { text: '去集市出售材料', next: 'market' },
      { text: '在寨中打探消息', next: 'inquire' }
    ]
  },
  
  inquire: {
    text: `<p class="narration">你在寨中四处走动，有意无意地打听各种消息。</p>
    <p class="narration">从族人们的闲谈中，你了解到不少事情：</p>
    <p class="narration">· 族中藏经阁收藏了许多蛊修典籍，有功弟子才能进入。</p>
    <p class="narration">· 后山深处据说有三王山遗迹，藏着上古蛊仙的传承，但危险无比。</p>
    <p class="narration">· 三个月后，将举办族比，名列前茅者有重奖。</p>
    <p class="narration">· 传闻百年前，有一位叫"幽魂魔尊"的大能在青茅山留下过传承……</p>
    <p class="narration">还有一则隐秘的消息：族中禁地藏着一只六转仙蛊——<strong class="important">春秋蝉</strong>，能令人时光倒流，重回过去。但只是传说，没人见过。</p>`,
    choices: [
      { text: '对春秋蝉很感兴趣，想办法打探更多', next: 'chunqiu_inquire' },
      { text: '去藏经阁看看', next: 'cangjingge' },
      { text: '准备三个月后的族比', next: 'zubi_prepare' }
    ]
  },
  
  chunqiu_inquire: {
    text: `<p class="narration">你开始有意地打听春秋蝉的消息。但这似乎是族中最高机密，没人愿意多谈。</p>
    <p class="narration">几经周折，你才从一个醉醺醺的老酒鬼口中听到了只言片语：</p>
    <p class="narration">"春秋蝉……在禁地……只有家主和几位族老知道具体位置……那可是仙蛊啊……"</p>
    <p class="narration">说完，老酒鬼就醉倒了，再问什么都不说。</p>
    <p class="narration">你心中微动。如果能得到春秋蝉，就等于有了重来一次的机会，无论做错什么都可以反悔……</p>
    <p class="narration">但盗取仙蛊，可是灭族大罪。</p>`,
    choices: [
      { text: '暗中谋划，寻找盗取春秋蝉的机会', next: 'steal_chunqiu_plan', requireKarma: 5 },
      { text: '太危险了，还是老老实实修炼吧', next: 'tolerance' }
    ]
  },
  
  cangjingge: {
    text: `<p class="narration">你来到藏经阁。守门的老者瞥了你一眼："外姓子弟？有功勋才能进。"</p>
    <p class="narration">你拿出历练时获得的妖兽材料，缴纳了入门费用，老者才放你进去。</p>
    <p class="narration">藏经阁内书架林立，摆满了各种蛊修典籍。你走马观花地看着：</p>
    <p class="narration">《基础炼蛊术》《常见蛊虫图鉴》《空窍修行要旨》《杀招入门》……</p>
    <p class="narration">你只能在第一层阅读，更高深的典籍需要更高的身份权限。</p>`,
    choices: [
      { text: '研读炼蛊之术', next: 'study_liangu' },
      { text: '研读杀招之法', next: 'study_shazhao' },
      { text: '离开藏经阁', next: 'back_village' }
    ]
  },
  
  study_liangu: {
    text: `<p class="narration">你潜心研读《基础炼蛊术》，对蛊虫融合有了系统的认识。</p>
    <p class="narration">原来蛊虫融合并非随意而为，有特定的配方和法门。两只同阶蛊虫融合，有概率升阶；特定配方则能合成特定蛊虫。</p>
    <p class="narration">你还记下了几个简单的融合配方。</p>
    <p class="important">【学会：基础炼蛊术】</p>
    <p class="important">【融合成功率+10%】</p>`,
    choices: [
      { text: '继续研读其他典籍', next: 'cangjingge' },
      { text: '离开藏经阁', next: 'back_village' }
    ],
    onEnter: function(s) {
      s.fusionBonus = (s.fusionBonus || 0) + 0.1;
      unlockAchievement('first_fusion');
    }
  },
  
  study_shazhao: {
    text: `<p class="narration">你翻阅《杀招入门》，了解到仙道杀招的奥秘。</p>
    <p class="narration">所谓杀招，就是将多只蛊虫的力量组合起来，爆发出远超单只蛊虫的威力。但杀招对蛊虫搭配和真元操控要求极高，稍有不慎就会反噬。</p>
    <p class="narration">你记下了一道基础杀招——月华斩，需要月华蛊配合小光蛊催动。</p>
    <p class="important">【习得杀招：月华斩（需月华蛊+小光蛊）】</p>`,
    choices: [
      { text: '继续研读', next: 'cangjingge' },
      { text: '离开藏经阁', next: 'back_village' }
    ],
    onEnter: function(s) {
      if (!s.learnedKillers) s.learnedKillers = [];
      if (!s.learnedKillers.includes('yuehua_zhan')) {
        s.learnedKillers.push('yuehua_zhan');
      }
      renderKillers();
    }
  },
  
  market: {
    text: `<p class="narration">山寨的集市上颇为热闹，各族弟子摆摊交易，蛊虫、材料、元石应有尽有。</p>
    <p class="narration">你逛了一圈，发现了几个值得注意的摊位：</p>
    <p class="narration">· 一个老者在卖各式装备，品质看起来还不错。</p>
    <p class="narration">· 一个少女摆摊收售蛊虫，品种繁多。</p>
    <p class="narration">· 角落里还有个神秘商人，神神秘秘的，不知卖些什么。</p>`,
    choices: [
      { text: '去装备摊看看', next: 'shop_weapon' },
      { text: '去蛊虫摊看看', next: 'shop_gu' },
      { text: '去神秘商人那里', next: 'shop_mystery' },
      { text: '离开集市', next: 'back_village' }
    ]
  },
  
  shop_weapon: {
    text: `<p class="narration">装备摊上摆着各种武器防具。老者笑眯眯地招呼你："小兄弟，看看？都是好东西。"</p>
    <p class="narration">你扫了一眼：</p>
    <p class="narration">· 木羽刀 — 15元石</p>
    <p class="narration">· 石英甲 — 25元石</p>
    <p class="narration">· 月牙佩 — 30元石</p>`,
    choices: [
      { text: '购买木羽刀（15元石）', next: 'buy_muyu', cost: { yuanshi: 15 } },
      { text: '购买石英甲（25元石）', next: 'buy_shiying', cost: { yuanshi: 25 } },
      { text: '购买月牙佩（30元石）', next: 'buy_yueya', cost: { yuanshi: 30 } },
      { text: '不买了，离开', next: 'market' }
    ]
  },
  
  buy_muyu: {
    text: `<p class="narration">你花15元石买下了木羽刀。刀身轻盈，适合蛊师配合蛊虫使用。</p>
    <p class="important">【获得装备：木羽刀（武器·凡品）】</p>`,
    choices: [
      { text: '继续逛', next: 'market' }
    ],
    onEnter: function(s) {
      if ((s.yuanshi || 0) >= 15) {
        s.yuanshi -= 15;
        equipItem('muyu_dao');
      }
    }
  },
  
  buy_shiying: {
    text: `<p class="narration">你花25元石买下了石英甲。虽然不算坚固，但聊胜于无。</p>
    <p class="important">【获得装备：石英甲（防具·良品）】</p>`,
    choices: [
      { text: '继续逛', next: 'market' }
    ],
    onEnter: function(s) {
      if ((s.yuanshi || 0) >= 25) {
        s.yuanshi -= 25;
        equipItem('shiying_jia');
      }
    }
  },
  
  buy_yueya: {
    text: `<p class="narration">你花30元石买下了月牙佩。玉佩温润，据说能温养空窍，提升真元上限。</p>
    <p class="important">【获得装备：月牙佩（饰品·良品）】</p>
    <p class="important">【真元上限+20】</p>`,
    choices: [
      { text: '继续逛', next: 'market' }
    ],
    onEnter: function(s) {
      if ((s.yuanshi || 0) >= 30) {
        s.yuanshi -= 30;
        equipItem('yueya_pei');
        s.maxZhenyuan += 20;
      }
    }
  },
  
  shop_gu: {
    text: `<p class="narration">蛊虫摊上摆着一个个玉盒，里面装着各种蛊虫。少女介绍道："都是一转蛊，价格公道。"</p>
    <p class="narration">· 月光蛊 — 20元石</p>
    <p class="narration">· 石皮蛊 — 18元石</p>
    <p class="narration">· 蚊子蛊 — 12元石</p>`,
    choices: [
      { text: '买一只月光蛊（20元石）', next: 'buy_yueguang2' },
      { text: '买一只石皮蛊（18元石）', next: 'buy_shipi2' },
      { text: '离开', next: 'market' }
    ]
  },
  
  buy_yueguang2: {
    text: `<p class="narration">你买下一只月光蛊，可以留着融合用。</p>
    <p class="important">【获得：月光蛊 ×1】</p>`,
    choices: [{ text: '继续逛', next: 'market' }],
    onEnter: function(s) {
      if ((s.yuanshi || 0) >= 20) {
        s.yuanshi -= 20;
        addGu('yueguang');
      }
    }
  },
  
  buy_shipi2: {
    text: `<p class="narration">你买下一只石皮蛊。</p>
    <p class="important">【获得：石皮蛊 ×1】</p>`,
    choices: [{ text: '继续逛', next: 'market' }],
    onEnter: function(s) {
      if ((s.yuanshi || 0) >= 18) {
        s.yuanshi -= 18;
        addGu('shipi');
      }
    }
  },
  
  shop_mystery: {
    text: `<p class="narration">角落里的神秘商人裹着黑袍，看不清面容。见你过来，沙哑地说："想知道命运的走向吗？"</p>
    <p class="narration">"一枚元石，我给你算一卦。"</p>`,
    choices: [
      { text: '花1元石算一卦', next: 'divination' },
      { text: '骗子，走开', next: 'market' }
    ]
  },
  
  divination: {
    text: `<p class="narration">你递过一枚元石。神秘商人接过，掏出一副古怪的骨牌摆弄起来。</p>
    <p class="narration">良久，他缓缓道："命星晦暗，前世有因……你不属于这个世界，对吗？"</p>
    <p class="narration">你心中一惊！</p>
    <p class="narration">"莫慌，老朽只是略通推演之术。你的命运……很有趣。有大机缘，也有大凶险。是正是魔，全在你一念之间。"</p>
    <p class="narration">"去吧，你的路……才刚刚开始。"</p>
    <p class="narration">说完，神秘商人便不再言语。你满腹疑惑地离开了。</p>`,
    choices: [{ text: '离开集市', next: 'back_village' }],
    onEnter: function(s) {
      s.yuanshi = Math.max(0, (s.yuanshi || 0) - 1);
    }
  },
  
  zubi_prepare: {
    text: `<p class="narration">你决定为三个月后的族比做准备。只要能在族比中取得好名次，就能获得大量资源，甚至进入藏经阁高层。</p>
    <p class="narration">接下来的日子，你一边修炼提升修为，一边打磨蛊虫运用技巧。</p>
    <p class="narration">时间飞逝，三个月转瞬即逝。你的实力有了长足进步。</p>
    <p class="important">【修为大幅提升】</p>
    <p class="narration">族比之日，终于到来了。</p>`,
    choices: [
      { text: '参加族比', next: 'zubi_start' }
    ],
    onEnter: function(s) {
      s.realm = Math.max(s.realm, 2);
      s.xiuweiProgress = 50;
      gainExp(100);
      updateUI();
    }
  },
  
  zubi_start: {
    text: `<p class="narration">族比擂台上，各族弟子轮番上阵。你一路过关斩将，凭借出色的蛊虫操控技巧，打进了前十。</p>

// ==================== 游戏状态 ====================

let gameState = {
  playerName: '方源',
  identity: '外姓子弟',
  realm: 0, // 境界索引
  xiuweiProgress: 10,
  maxZhenyuan: 100,
  zhenyuan: 10,
  qiaoGrade: '下品海窍',
  mingu: null,
  guList: [],
  equipment: { weapon: null, armor: null, accessory: null },
  bag: [],
  yuanshi: 10,
  karma: 0, // 负=正道，正=魔道
  currentScene: 'start',
  achievements: [],
  learnedKillers: [],
  fusionBonus: 0,
  paradiseUnlocked: false,
  paradise: null,
  dungeonProgress: {},
  route: 'neutral' // neutral, zheng, mo, san
};

let fusionSelection = [null, null];
let currentBattle = null;

// ==================== 游戏逻辑 ====================

function startNewGame() {
  const name = document.getElementById('player-name').value.trim() || '方源';
  gameState = {
    playerName: name,
    identity: '外姓子弟',
    realm: 0,
    xiuweiProgress: 10,
    maxZhenyuan: 100,
    zhenyuan: 10,
    qiaoGrade: '下品海窍',
    mingu: null,
    guList: [],
    equipment: { weapon: null, armor: null, accessory: null },
    bag: [],
    yuanshi: 10,
    karma: 0,
    currentScene: 'start',
    achievements: [],
    learnedKillers: [],
    fusionBonus: 0,
    paradiseUnlocked: false,
    paradise: null,
    dungeonProgress: {},
    route: 'neutral'
  };
  
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  
  updateUI();
  goToScene('start');
  saveGame();
}

function loadGame() {
  const saved = localStorage.getItem('guzhenren_save');
  if (saved) {
    gameState = JSON.parse(saved);
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    updateUI();
    goToScene(gameState.currentScene);
    showToast('存档读取成功');
  }
}

function saveGame() {
  localStorage.setItem('guzhenren_save', JSON.stringify(gameState));
}

// 检查存档
window.onload = function() {
  if (localStorage.getItem('guzhenren_save')) {
    document.getElementById('continue-btn').style.display = 'inline-block';
  }
};

function goToScene(sceneId) {
  const scene = STORY[sceneId];
  if (!scene) {
    console.error('Scene not found:', sceneId);
    return;
  }
  
  gameState.currentScene = sceneId;
  
  if (scene.onEnter) {
    scene.onEnter(gameState);
  }
  
  // 剧情文本
  const storyText = document.getElementById('story-text');
  storyText.innerHTML = scene.text;
  
  // 选项
  const choicesContainer = document.getElementById('choices-container');
  choicesContainer.innerHTML = '';
  
  if (scene.battle) {
    startBattle(scene.battle);
  } else if (scene.dungeon) {
    startDungeon(scene.dungeon);
  } else {
    scene.choices.forEach((choice, idx) => {
      // 检查条件
      if (choice.requireKarma !== undefined && gameState.karma < choice.requireKarma) {
        return;
      }
      
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.onclick = () => {
        // 恢复真元
        gameState.zhenyuan = Math.min(gameState.maxZhenyuan, gameState.zhenyuan + 5);
        goToScene(choice.next);
        saveGame();
      };
      choicesContainer.appendChild(btn);
    });
  }
  
  // 滚动到顶部
  document.getElementById('story-area').scrollTop = 0;
  updateUI();
}

function addGu(guId) {
  if (!gameState.guList.includes(guId)) {
    gameState.guList.push(guId);
    const gu = GU_DATABASE[guId];
    showToast(`获得蛊虫：${gu.name}`);
  }
  renderGuList();
}

function addItem(itemId, name, type, desc) {
  if (!gameState.bag.find(i => i.id === itemId)) {
    gameState.bag.push({ id: itemId, name, type, desc });
    showToast(`获得物品：${name}`);
  }
  renderBag();
}

function equipItem(equipId) {
  const equip = EQUIP_DATABASE[equipId];
  if (!equip) return;
  
  gameState.equipment[equip.slot] = equipId;
  showToast(`装备：${equip.name}`);
  renderEquipment();
}

function gainExp(exp) {
  gameState.xiuweiProgress = (gameState.xiuweiProgress || 0) + exp / 10;
  checkLevelUp();
}

function checkLevelUp() {
  while (gameState.xiuweiProgress >= 100 && gameState.realm < REALMS.length - 1) {
    gameState.xiuweiProgress -= 100;
    gameState.realm++;
    const realm = REALMS[gameState.realm];
    showToast(`突破！${realm.name}`);
    
    // 境界奖励
    if (gameState.realm === 4) { // 二转
      gameState.maxZhenyuan += 50;
      unlockAchievement('second_turn');
    }
    if (gameState.realm === 20) { // 六转蛊仙
      gameState.paradiseUnlocked = true;
      gameState.paradise = {
        level: 1,
        diqi: 100,
        lingquan: 10,
        buildings: []
      };
      unlockAchievement('gu_xian');
      renderParadise();
    }
  }
  updateUI();
}

function unlockAchievement(achId) {
  if (!gameState.achievements.includes(achId)) {
    gameState.achievements.push(achId);
    const ach = ACHIEVEMENTS.find(a => a.id === achId);
    if (ach) {
      showToast(`成就解锁：${ach.name}`);
    }
    renderAchievements();
  }
}

// ==================== 战斗系统 ====================

function startBattle(battleData) {
  currentBattle = {
    enemyName: battleData.enemy,
    enemyHp: battleData.hp,
    enemyMaxHp: battleData.hp,
    enemyAtk: battleData.atk,
    playerHp: 100 + gameState.realm * 20,
    playerMaxHp: 100 + gameState.realm * 20,
    onWin: battleData.onWin,
    onLose: battleData.onLose || 'battle_lose',
    log: []
  };
  
  document.getElementById('battle-enemy-name').textContent = battleData.enemy;
  updateBattleUI();
  renderBattleActions();
  addBattleLog(`遭遇了 ${battleData.enemy}！`);
  
  document.getElementById('battle-modal').classList.add('active');
}

function updateBattleUI() {
  const hpPercent = (currentBattle.enemyHp / currentBattle.enemyMaxHp) * 100;
  document.getElementById('enemy-hp-bar').style.width = hpPercent + '%';
  document.getElementById('enemy-hp-text').textContent = 
    `${Math.max(0, currentBattle.enemyHp)}/${currentBattle.enemyMaxHp}`;
}

function renderBattleActions() {
  const container = document.getElementById('battle-actions');
  container.innerHTML = '';
  
  // 攻击蛊
  gameState.guList.forEach(guId => {
    const gu = GU_DATABASE[guId];
    if (gu.damage && gameState.zhenyuan >= gu.cost) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-small';
      btn.textContent = `${gu.name}(${gu.cost}真元)`;
      btn.onclick = () => battleAttack(guId);
      container.appendChild(btn);
    }
  });
  
  // 杀招
  KILLER_SKILLS.forEach(skill => {
    if (gameState.learnedKillers.includes(skill.id)) {
      const hasAll = skill.req.every(g => gameState.guList.includes(g));
      if (hasAll && gameState.zhenyuan >= skill.cost) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-small btn-primary';
        btn.textContent = `${skill.name}(${skill.cost})`;
        btn.onclick = () => battleKiller(skill);
        container.appendChild(btn);
      }
    }
  });
  
  // 普通攻击
  const atkBtn = document.createElement('button');
  atkBtn.className = 'btn btn-small';
  atkBtn.textContent = '普攻';
  atkBtn.onclick = () => battleNormalAttack();
  container.appendChild(atkBtn);
  
  // 逃跑
  const fleeBtn = document.createElement('button');
  fleeBtn.className = 'btn btn-small';
  fleeBtn.textContent = '逃跑';
  fleeBtn.onclick = () => battleFlee();
  container.appendChild(fleeBtn);
}

function battleAttack(guId) {
  const gu = GU_DATABASE[guId];
  gameState.zhenyuan -= gu.cost;
  
  const damage = gu.damage + Math.floor(Math.random() * 10);
  currentBattle.enemyHp -= damage;
  addBattleLog(`你催动${gu.name}，造成 ${damage} 点伤害！`);
  
  checkBattleEnd() || enemyTurn();
}

function battleKiller(skill) {
  gameState.zhenyuan -= skill.cost;
  
  const damage = skill.damage + Math.floor(Math.random() * 20);
  currentBattle.enemyHp -= damage;
  addBattleLog(`你催动杀招【${skill.name}】，造成 ${damage} 点伤害！`);
  
  checkBattleEnd() || enemyTurn();
}

function battleNormalAttack() {
  const baseAtk = 5 + gameState.realm * 3;
  const damage = baseAtk + Math.floor(Math.random() * 5);
  currentBattle.enemyHp -= damage;
  addBattleLog(`你近身攻击，造成 ${damage} 点伤害。`);
  
  checkBattleEnd() || enemyTurn();
}

function enemyTurn() {
  const damage = currentBattle.enemyAtk + Math.floor(Math.random() * 5);
  currentBattle.playerHp -= damage;
  addBattleLog(`${currentBattle.enemyName}反击，你受到 ${damage} 点伤害。`);
  
  if (currentBattle.playerHp <= 0) {
    addBattleLog('你战败了……');
    setTimeout(() => {
      document.getElementById('battle-modal').classList.remove('active');
      goToScene(currentBattle.onLose);
    }, 1500);
  }
  
  updateBattleUI();
  renderBattleActions();
  updateUI();
}

function checkBattleEnd() {
  updateBattleUI();
  
  if (currentBattle.enemyHp <= 0) {
    addBattleLog(`你击败了${currentBattle.enemyName}！`);
    setTimeout(() => {
      document.getElementById('battle-modal').classList.remove('active');
      goToScene(currentBattle.onWin);
    }, 1500);
    return true;
  }
  return false;
}

function battleFlee() {
  if (Math.random() > 0.5) {
    addBattleLog('你成功逃脱了！');
    setTimeout(() => {
      document.getElementById('battle-modal').classList.remove('active');
      goToScene('back_village');
    }, 1000);
  } else {
    addBattleLog('逃跑失败！');
    enemyTurn();
  }
}

function addBattleLog(text) {
  currentBattle.log.push(text);
  const logEl = document.getElementById('battle-log');
  logEl.innerHTML = currentBattle.log.map(l => `<div>${l}</div>`).join('');
  logEl.scrollTop = logEl.scrollHeight;
}

// ==================== 副本系统 ====================

function startDungeon(dungeonId) {
  const dungeon = DUNGEONS.find(d => d.id === dungeonId);
  if (!dungeon) return;
  
  if (gameState.realm < dungeon.reqRealm) {
    showToast(`修为不足，需要${REALMS[dungeon.reqRealm].name}`);
    goToScene('free_play');
    return;
  }
  
  // 随机遇到一个敌人
  const enemy = dungeon.enemies[Math.floor(Math.random() * dungeon.enemies.length)];
  
  currentBattle = {
    enemyName: enemy.name,
    enemyHp: enemy.hp,
    enemyMaxHp: enemy.hp,
    enemyAtk: enemy.atk,
    playerHp: 100 + gameState.realm * 20,
    playerMaxHp: 100 + gameState.realm * 20,
    expReward: enemy.exp,
    dungeonReward: dungeon.rewards,
    onWin: 'dungeon_win',
    onLose: 'dungeon_lose',
    log: []
  };
  
  document.getElementById('battle-enemy-name').textContent = enemy.name;
  updateBattleUI();
  renderBattleActions();
  addBattleLog(`在${dungeon.name}遭遇了 ${enemy.name}！`);
  
  document.getElementById('battle-modal').classList.add('active');
}

// ==================== 融合系统 ====================

function selectFusionGu(slotIndex) {
  // 简单的选择逻辑：列出可用蛊虫
  const available = gameState.guList.filter(g => {
    const gu = GU_DATABASE[g];
    return gu.grade <= 5; // 仙蛊不能融合
  });
  
  if (available.length < 2) {
    showToast('蛊虫数量不足');
    return;
  }
  
  // 简化：轮流选
  const nextGu = available[Math.floor(Math.random() * available.length)];
  fusionSelection[slotIndex] = nextGu;
  
  const gu = GU_DATABASE[nextGu];
  const slot = document.getElementById(`fusion-slot-${slotIndex + 1}`);
  slot.innerHTML = `<div class="gu-name quality-${gu.grade}">${gu.name}</div><div class="gu-type">${gu.grade}转</div>`;
  slot.classList.add('filled');
}

function doFusion() {
  if (!fusionSelection[0] || !fusionSelection[1]) {
    document.getElementById('fusion-result').textContent = '请先选择两只蛊虫';
    return;
  }
  
  const gu1 = GU_DATABASE[fusionSelection[0]];
  const gu2 = GU_DATABASE[fusionSelection[1]];
  
  if (gu1.grade !== gu2.grade) {
    document.getElementById('fusion-result').innerHTML = 
      '<span style="color:#c85050;">失败：两只蛊虫品阶不同，无法融合</span>';
    return;
  }
  
  // 检查配方
  const key1 = `${fusionSelection[0]}+${fusionSelection[1]}`;
  const key2 = `${fusionSelection[1]}+${fusionSelection[0]}`;
  const recipe = FUSION_RECIPES[key1] || FUSION_RECIPES[key2];
  
  let successRate = 0.4 + (gameState.fusionBonus || 0);
  let resultGu = null;
  let resultName = '';
  
  if (recipe) {
    successRate = recipe.rate + (gameState.fusionBonus || 0);
    resultGu = recipe.result;
    resultName = recipe.name;
  } else {
    // 随机升阶
    if (gu1.grade < 5) {
      resultName = `随机${gu1.grade + 1}转蛊虫`;
    }
  }
  
  // 执行融合
  const success = Math.random() < successRate;
  
  // 移除原材料
  gameState.guList = gameState.guList.filter(g => g !== fusionSelection[0]);
  if (fusionSelection[0] !== fusionSelection[1]) {
    gameState.guList = gameState.guList.filter(g => g !== fusionSelection[1]);
  } else {
    // 同种两只，只移除一只的话需要特殊处理
    // 简化：移除第一个出现的
    const idx = gameState.guList.indexOf(fusionSelection[1]);
    if (idx > -1) gameState.guList.splice(idx, 1);
  }
  
  if (success) {
    if (resultGu) {
      addGu(resultGu);
    } else {
      // 随机升阶蛊
      const gradeUp = gu1.grade + 1;
      const pool = Object.entries(GU_DATABASE).filter(([k, v]) => v.grade === gradeUp);
      if (pool.length > 0) {
        const [rid, rgu] = pool[Math.floor(Math.random() * pool.length)];
        addGu(rid);
        resultName = rgu.name;
      }
    }
    document.getElementById('fusion-result').innerHTML = 
      `<span style="color:#50c850;">融合成功！获得：${resultName}</span>`;
  } else {
    document.getElementById('fusion-result').innerHTML = 
      '<span style="color:#c85050;">融合失败！蛊虫全部损毁</span>';
  }
  
  // 重置选择
  fusionSelection = [null, null];
  document.getElementById('fusion-slot-1').innerHTML = '点击选择';
  document.getElementById('fusion-slot-1').classList.remove('filled');
  document.getElementById('fusion-slot-2').innerHTML = '点击选择';
  document.getElementById('fusion-slot-2').classList.remove('filled');
  
  renderGuList();
  updateUI();
  saveGame();
}

// ==================== UI更新 ====================

function updateUI() {
  const realm = REALMS[gameState.realm] || REALMS[0];
  
  document.getElementById('display-name').textContent = gameState.playerName;
  document.getElementById('player-identity').textContent = gameState.identity;
  
  const realmEl = document.getElementById('player-realm');
  realmEl.textContent = realm.name;
  realmEl.className = `stat-value quality-${realm.grade}`;
  
  document.getElementById('xiuwei-bar').style.width = gameState.xiuweiProgress + '%';
  document.getElementById('zhenyuan-text').textContent = `${Math.floor(gameState.zhenyuan)}/${gameState.maxZhenyuan}`;
  document.getElementById('zhenyuan-bar').style.width = (gameState.zhenyuan / gameState.maxZhenyuan * 100) + '%';
  document.getElementById('qiao-grade').textContent = gameState.qiaoGrade;
  
  // 本命蛊
  if (gameState.mingu) {
    const mingu = GU_DATABASE[gameState.mingu];
    document.getElementById('mingu-display').innerHTML = 
      `<div class="gu-name quality-${mingu.grade}">${mingu.name}</div>
       <div class="gu-type">${mingu.type}型 · ${mingu.grade}转</div>`;
  }
  
  renderGuList();
  renderEquipment();
  renderBag();
  renderKillers();
  renderDungeons();
  renderParadise();
  renderAchievements();
}

function renderGuList() {
  const container = document.getElementById('gu-list');
  container.innerHTML = '';
  
  gameState.guList.forEach(guId => {
    const gu = GU_DATABASE[guId];
    if (!gu) return;
    
    const div = document.createElement('div');
    div.className = 'gu-item';
    div.innerHTML = `
      <div class="gu-name quality-${gu.grade}">${gu.name}</div>
      <div class="gu-type">${gu.type} · ${gu.grade}转</div>
    `;
    div.title = gu.desc;
    container.appendChild(div);
  });
}

function renderEquipment() {
  const slots = ['weapon', 'armor', 'accessory'];
  const slotNames = { weapon: '武器', armor: '防具', accessory: '饰品' };
  
  slots.forEach(slot => {
    const el = document.getElementById(`equip-${slot}`);
    const equipId = gameState.equipment[slot];
    
    if (equipId && EQUIP_DATABASE[equipId]) {
      const equip = EQUIP_DATABASE[equipId];
      el.className = 'equip-slot';
      el.innerHTML = `${slotNames[slot]}：<span class="quality-${equip.quality}">${equip.name}</span>`;
    } else {
      el.className = 'equip-slot empty';
      el.textContent = `${slotNames[slot]}：空`;
    }
  });
}

function renderBag() {
  const container = document.getElementById('bag-list');
  container.innerHTML = '';
  
  // 元石
  const yuanshiDiv = document.createElement('div');
  yuanshiDiv.className = 'item-card';
  yuanshiDiv.innerHTML = `
    <div class="item-card-header">
      <span class="quality-2">元石</span>
      <span>×${gameState.yuanshi || 0}</span>
    </div>
    <div class="item-desc">蛊修世界的通用货币与修炼资源</div>
  `;
  container.appendChild(yuanshiDiv);
  
  gameState.bag.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="item-card-header">
        <span>${item.name}</span>
        <span style="font-size: 0.75rem; color: #6a5a40;">${item.type}</span>
      </div>
      <div class="item-desc">${item.desc}</div>
    `;
    container.appendChild(div);
  });
}

function renderKillers() {
  const container = document.getElementById('killer-list');
  container.innerHTML = '';
  
  KILLER_SKILLS.forEach(skill => {
    const learned = gameState.learnedKillers.includes(skill.id);
    const hasAll = skill.req.every(g => gameState.guList.includes(g));
    
    const div = document.createElement('div');
    div.className = 'killer-card';
    div.style.opacity = learned ? '1' : '0.5';
    
    const reqText = skill.req.map(g => {
      const gu = GU_DATABASE[g];
      return gu ? gu.name : g;
    }).join(' + ');
    
    div.innerHTML = `
      <div class="killer-name">${skill.name} ${learned ? '' : '(未习得)'}</div>
      <div class="killer-req">所需：${reqText}</div>
      <div class="killer-req">消耗：${skill.cost}真元</div>
      <div class="killer-desc">${skill.desc}</div>
      ${hasAll && !learned ? '<button class="btn btn-small" style="margin-top:8px;" onclick="learnKiller(\'' + skill.id + '\')">参悟</button>' : ''}
    `;
    container.appendChild(div);
  });
}

function learnKiller(skillId) {
  if (!gameState.learnedKillers.includes(skillId)) {
    gameState.learnedKillers.push(skillId);
    const skill = KILLER_SKILLS.find(k => k.id === skillId);
    showToast(`习得杀招：${skill.name}`);
    unlockAchievement('first_killer');
    renderKillers();
    saveGame();
  }
}

function renderDungeons() {
  const container = document.getElementById('dungeon-list');
  container.innerHTML = '';
  
  DUNGEONS.forEach(dungeon => {
    const unlocked = gameState.realm >= dungeon.reqRealm;
    
    const div = document.createElement('div');
    div.className = 'dungeon-card';
    div.style.opacity = unlocked ? '1' : '0.5';
    
    div.innerHTML = `
      <div class="dungeon-name">${dungeon.name}</div>
      <div class="dungeon-info">${dungeon.desc}</div>
      <div class="dungeon-info">需求修为：${REALMS[dungeon.reqRealm].name}</div>
      ${unlocked ? '<button class="btn btn-small btn-primary" onclick="enterDungeon(\'' + dungeon.id + '\')">进入</button>' : '<span style="color:#6a5a40; font-size:0.8rem;">修为不足</span>'}
    `;
    container.appendChild(div);
  });
}

function enterDungeon(dungeonId) {
  startDungeon(dungeonId);
}

function renderParadise() {
  if (gameState.paradiseUnlocked) {
    document.getElementById('paradise-locked').style.display = 'none';
    document.getElementById('paradise-content').style.display = 'block';
    
    const levels = ['下品福地', '中品福地', '上品福地', '极品福地', '仙级洞天'];
    document.getElementById('paradise-level').textContent = levels[Math.min(gameState.paradise.level - 1, 4)];
    document.getElementById('resource-diqi').textContent = gameState.paradise.diqi;
    document.getElementById('resource-lingquan').textContent = gameState.paradise.lingquan;
    
    const buildings = document.getElementById('paradise-buildings');
    buildings.innerHTML = `
      <div class="building-card">灵泉<br><span style="font-size:0.7rem; color:#6a5a40;">Lv.${gameState.paradise.level}</span></div>
      <div class="building-card">药园<br><span style="font-size:0.7rem; color:#6a5a40;">未建造</span></div>
      <div class="building-card">炼蛊室<br><span style="font-size:0.7rem; color:#6a5a40;">未建造</span></div>
      <div class="building-card">兽栏<br><span style="font-size:0.7rem; color:#6a5a40;">未建造</span></div>
    `;
  }
}

function renderAchievements() {
  const container = document.getElementById('achievement-list');
  container.innerHTML = '';
  
  ACHIEVEMENTS.forEach(ach => {
    const unlocked = gameState.achievements.includes(ach.id);
    
    const div = document.createElement('div');
    div.className = 'achievement-card' + (unlocked ? ' unlocked' : '');
    div.innerHTML = `
      <div class="achievement-name ${unlocked ? 'quality-5' : ''}">${unlocked ? ach.name : '???'}</div>
      <div class="achievement-desc">${unlocked ? ach.desc : '未解锁'}</div>
      ${unlocked ? `<div class="achievement-desc" style="color:#8b6914;">奖励：${ach.reward}</div>` : ''}
    `;
    container.appendChild(div);
  });
}

// ==================== 辅助功能 ====================

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');
}

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  
  setTimeout(() => toast.remove(), 3000);
}

function showModal(title, content) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

// ==================== 初始化 ====================

// 检查存档
window.addEventListener('load', function() {
  if (localStorage.getItem('guzhenren_save')) {
    document.getElementById('continue-btn').style.display = 'inline-block';
  }
});
</script>
